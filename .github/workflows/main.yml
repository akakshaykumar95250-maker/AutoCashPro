State	Description	Can Close?
idle	Ready to watch ad	N/A
loading	Ad is loading	❌ No
playing	Ad is playing with progress	❌ No
rewarded	Ad completed, reward earned	✅ Yes
closed_early	User tried to close early	✅ Yes
