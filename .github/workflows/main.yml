Here's the complete GitHub Actions workflow for EAS Build:

📄 Copy This to .github/workflows/main.yml:
name: Build Android APK with EAS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        run: npm ci
      
      # Step 4: Setup EAS
      - name: ⚙️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      # Step 5: Configure EAS project
      - name: 🔗 Configure EAS project
        run: eas build:configure --non-interactive
      
      # Step 6: Build APK (Development)
      - name: 🏗️ Build Android APK (Development)
        run: eas build --platform android --profile development --non-interactive
      
      # Step 7: Build APK (Production) - Uncomment if needed
      # - name: 🏗️ Build Android APK (Production)
      #   run: eas build --platform android --profile production --non-interactive
      
      # Step 8: Upload build info
      - name: 📤 Upload build info
        if: always()
        run: |
          echo "============================================"
          echo "Build completed!"
          echo "============================================"
          echo "Check your Expo dashboard for the APK download link:"
          echo "https://expo.dev/accounts/[your-account]/projects/autocash-pro/builds"
          echo "============================================"
